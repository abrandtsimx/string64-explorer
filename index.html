<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Prettifier & Explorer (Metadata Stripped)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');
        
        body {
            background-color: #0f172a;
            color: #e2e8f0;
        }

        .code-font {
            font-family: 'Fira Code', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Syntax Highlighting Colors */
        .token-string { color: #a5d6ff; }
        .token-number { color: #d2a8ff; }
        .token-boolean { color: #ff7b72; }
        .token-key { color: #79c0ff; }
        .token-null { color: #ffa657; }

        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
        }

        /* Explorer Styles */
        .tree-container {
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
        }
        .tree-item {
            margin-left: 1.5rem;
            position: relative;
        }
        .tree-node {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
            transition: background-color 0.1s;
        }
        .tree-node:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        .tree-toggle {
            width: 1rem;
            height: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 0.75rem;
            transition: transform 0.2s;
        }
        .tree-node.expanded .tree-toggle {
            transform: rotate(90deg);
        }
        .tree-children {
            display: none;
        }
        .tree-node.expanded + .tree-children {
            display: block;
        }
        .decoded-badge {
            background-color: #1e3a8a;
            color: #93c5fd;
            font-size: 0.65rem;
            padding: 0 0.25rem;
            border-radius: 0.25rem;
            font-weight: bold;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">
    <header class="max-w-6xl mx-auto w-full mb-6">
        <h1 class="text-3xl font-bold text-white flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 9h8"/><path d="M8 13h6"/></svg>
            Data Toolset Pro
        </h1>
        <p class="text-slate-400 mt-2">Recursive decoding and extraction (Strict Mode - Metadata Removal Only).</p>
    </header>

    <main class="max-w-6xl mx-auto w-full flex-grow flex flex-col gap-4">
        <!-- Tab Navigation -->
        <div class="flex border-b border-slate-800 mb-2">
            <button onclick="switchTab('json')" id="tab-json" class="px-6 py-2 font-medium transition-colors tab-active">JSON Prettifier</button>
            <button onclick="switchTab('lookup')" id="tab-lookup" class="px-6 py-2 font-medium text-slate-500 hover:text-slate-300 transition-colors">Tool Address Lookup</button>
            <button onclick="switchTab('explorer')" id="tab-explorer" class="px-6 py-2 font-medium text-slate-500 hover:text-slate-300 transition-colors">Explorer</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Input Section -->
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold uppercase tracking-wider text-slate-500">Input Data</label>
                </div>
                <textarea 
                    id="jsonInput" 
                    class="w-full h-[600px] bg-slate-800 border border-slate-700 rounded-xl p-4 code-font text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none custom-scrollbar resize-none"
                    placeholder='Paste your JSON or Base64 here...'
                ></textarea>
                
                <div class="flex gap-3">
                    <button 
                        onclick="processInput()" 
                        class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20"
                    >
                        <span id="btnText">Prettify JSON</span>
                    </button>
                    <button 
                        onclick="clearAll()" 
                        class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-6 rounded-lg transition-all"
                    >
                        Clear
                    </button>
                </div>
            </div>

            <!-- Output Section -->
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <label id="outputLabel" class="text-sm font-semibold uppercase tracking-wider text-slate-500">Output</label>
                    <button 
                        id="copyBtn"
                        onclick="copyToClipboard()" 
                        class="text-xs flex items-center gap-1 bg-slate-700 hover:bg-slate-600 py-1 px-3 rounded transition-colors"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        Copy
                    </button>
                </div>
                <div 
                    id="jsonOutput" 
                    class="w-full h-[600px] bg-black/40 border border-slate-700 rounded-xl p-4 code-font text-sm overflow-auto custom-scrollbar whitespace-pre"
                ></div>
                
                <div id="statusMessage" class="hidden p-4 rounded-lg text-sm font-medium"></div>
            </div>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto w-full mt-8 py-6 border-t border-slate-800 text-slate-500 text-xs text-center">
        v3.8 - Strict Mode: Metadata stripping only. All heuristic regex repairs removed.
    </footer>

    <script>
        let currentTab = 'json';

        function showMessage(msg, type = 'success') {
            const status = document.getElementById('statusMessage');
            status.textContent = msg;
            status.className = `p-4 rounded-lg text-sm font-medium ${type === 'success' ? 'bg-emerald-900/30 text-emerald-400 border border-emerald-800' : 'bg-red-900/30 text-red-400 border border-red-800'}`;
            status.classList.remove('hidden');
        }

        function switchTab(tab) {
            currentTab = tab;
            const tabs = ['json', 'lookup', 'explorer'];
            tabs.forEach(t => {
                document.getElementById(`tab-${t}`).className = `px-6 py-2 font-medium transition-colors ${tab === t ? 'tab-active' : 'text-slate-500 hover:text-slate-300'}`;
            });
            
            const btnLabels = { 'json': 'Prettify JSON', 'lookup': 'Extract Tool Addresses', 'explorer': 'Load into Explorer' };
            const outputLabels = { 'json': 'Output (Standard JSON)', 'lookup': 'Extracted Tool Addresses', 'explorer': 'Interactive Explorer' };

            document.getElementById('btnText').textContent = btnLabels[tab];
            document.getElementById('outputLabel').textContent = outputLabels[tab];
            
            if (document.getElementById('jsonInput').value) processInput();
        }

        function decodeIfBase64(input) {
            if (!input.includes(':') && !input.startsWith('{') && !input.startsWith('[') && /^[A-Za-z0-9+/=]{10,}$/.test(input)) {
                try {
                    const decoded = atob(input);
                    if (decoded.includes('"')) return decoded;
                } catch (e) {}
            }
            return input;
        }

        function stripMetadata(text) {
            // Regex identifying "Metadata" key and its array content.
            // Replaces with an empty array to prevent nested syntax errors.
            return text.replace(/"Metadata"\s*:?\s*\[[^\]]*\]/g, '"Metadata": []');
        }

        function processInput() {
            let input = document.getElementById('jsonInput').value.trim();
            const outputElement = document.getElementById('jsonOutput');

            if (!input) return;

            // 1. Initial Decode
            input = decodeIfBase64(input);
            
            // 2. Metadata Stripping (The only allowed repair)
            const cleanText = stripMetadata(input);

            if (currentTab === 'lookup') {
                recursiveToolExtract(cleanText);
                return;
            }

            if (currentTab === 'json') {
                try {
                    // Final wrap check for naked JSON fragments
                    let jsonToParse = cleanText;
                    if (jsonToParse.startsWith('"') && !jsonToParse.startsWith('{')) {
                        jsonToParse = '{' + jsonToParse + '}';
                    }
                    const jsonObj = JSON.parse(jsonToParse);
                    outputElement.innerHTML = syntaxHighlight(JSON.stringify(jsonObj, null, 4));
                    showMessage("JSON Metadata stripped and formatted!");
                } catch (err) {
                    outputElement.textContent = "Error parsing JSON:\n" + err.message + "\n\nNote: All auto-repairs are disabled. Ensure input is valid JSON once Metadata is removed.";
                    showMessage("Parsing error.", "error");
                }
            } else if (currentTab === 'explorer') {
                runExplorer(cleanText);
            }
        }

        /** Explorer Logic **/
        function runExplorer(jsonStr) {
            const outputElement = document.getElementById('jsonOutput');
            try {
                if (jsonStr.startsWith('"') && !jsonStr.startsWith('{')) jsonStr = '{' + jsonStr + '}';
                const data = JSON.parse(jsonStr);
                const processedData = recursivelyDecodeData(data);
                
                outputElement.innerHTML = '';
                const container = document.createElement('div');
                container.className = 'tree-container p-2';
                container.appendChild(buildTreeElement(processedData, "Root"));
                outputElement.appendChild(container);
                showMessage("Explorer loaded.");
            } catch (e) {
                outputElement.textContent = "Explorer Error: JSON parse failed.\n" + e.message;
                showMessage("Explorer failed.", "error");
            }
        }

        function recursivelyDecodeData(obj) {
            if (typeof obj !== 'object' || obj === null) return obj;
            if (Array.isArray(obj)) return obj.map(item => recursivelyDecodeData(item));

            const newObj = {};
            for (let key in obj) {
                let val = obj[key];
                if ((key === "RawData" || key === "MetaData") && typeof val === 'string' && val.length > 20) {
                    try {
                        const decoded = atob(val);
                        if (decoded.includes('"')) {
                            const parsed = JSON.parse(stripMetadata(decoded));
                            newObj[key] = recursivelyDecodeData(parsed);
                            newObj[key].__wasBase64 = true;
                            continue;
                        }
                    } catch (e) {}
                }
                newObj[key] = recursivelyDecodeData(val);
            }
            return newObj;
        }

        function buildTreeElement(data, key) {
            const item = document.createElement('div');
            item.className = 'tree-item';
            const isObject = typeof data === 'object' && data !== null;
            const node = document.createElement('div');
            node.className = 'tree-node';

            const toggle = document.createElement('span');
            toggle.className = 'tree-toggle';
            toggle.innerHTML = isObject ? '▶' : '•';
            node.appendChild(toggle);

            const keySpan = document.createElement('span');
            keySpan.className = 'token-key';
            keySpan.textContent = key + ': ';
            node.appendChild(keySpan);

            if (isObject) {
                const typeInfo = document.createElement('span');
                typeInfo.className = 'text-slate-500 text-xs italic';
                typeInfo.textContent = Array.isArray(data) ? `Array[${data.length}]` : 'Object';
                node.appendChild(typeInfo);
                if (data.__wasBase64) {
                    const badge = document.createElement('span');
                    badge.className = 'decoded-badge';
                    badge.textContent = 'B64 DECODED';
                    node.appendChild(badge);
                }
                const children = document.createElement('div');
                children.className = 'tree-children';
                node.onclick = (e) => {
                    e.stopPropagation();
                    node.classList.toggle('expanded');
                    toggle.innerHTML = node.classList.contains('expanded') ? '▼' : '▶';
                };
                for (let childKey in data) {
                    if (childKey === '__wasBase64') continue;
                    children.appendChild(buildTreeElement(data[childKey], childKey));
                }
                item.appendChild(node);
                item.appendChild(children);
            } else {
                const valSpan = document.createElement('span');
                if (typeof data === 'string') valSpan.className = 'token-string';
                else if (typeof data === 'number') valSpan.className = 'token-number';
                else if (typeof data === 'boolean') valSpan.className = 'token-boolean';
                else if (data === null) valSpan.className = 'token-null';
                valSpan.textContent = typeof data === 'string' ? `"${data}"` : String(data);
                node.appendChild(valSpan);
                item.appendChild(node);
            }
            return item;
        }

        /** Tool Lookup Logic **/
        function recursiveToolExtract(text) {
            const outputElement = document.getElementById('jsonOutput');
            let allTools = new Set();
            let seenContent = new Set();
            let queue = [text];

            const rawDataRegex = /"(?:RawData|MetaData)"\s*:\s*"([A-Za-z0-9+/=]{24,})"/g;
            const genericB64Regex = /"([A-Za-z0-9+/=]{40,})"/g;
            const toolRegex = /"ToolAddress"\s*:\s*"([^":\s][^"]*)"/g;

            while (queue.length > 0) {
                let current = queue.shift();
                if (!current || seenContent.has(current)) continue;
                seenContent.add(current);
                
                const toolMatches = [...current.matchAll(toolRegex)];
                for (const m of toolMatches) {
                    const tool = m[1].trim();
                    if (tool && tool !== ":" && tool.length > 1) {
                        allTools.add(tool);
                    }
                }

                const b64Targets = [...current.matchAll(rawDataRegex), ...current.matchAll(genericB64Regex)];
                for (const m of b64Targets) {
                    try {
                        const decoded = atob(m[1]);
                        const cleaned = stripMetadata(decoded);
                        if (cleaned.includes('"')) queue.push(cleaned);
                    } catch (e) {}
                }
            }

            if (allTools.size > 0) {
                let listHtml = Array.from(allTools).sort().map(addr => `
                    <div class="py-2 border-b border-slate-800 last:border-0 group flex items-center gap-3">
                        <span class="text-blue-500 opacity-50 group-hover:opacity-100 transition-opacity">➔</span>
                        <span class="token-string font-medium cursor-pointer hover:underline" onclick="copyValue('${addr}')">${addr}</span>
                    </div>
                `).join('');
                outputElement.innerHTML = `<div class="flex flex-col p-2">${listHtml}</div>`;
                showMessage(`Extracted ${allTools.size} unique tool addresses.`);
            } else {
                outputElement.innerHTML = `<div class="text-slate-500 italic p-4 text-center">No ToolAddress entries found.</div>`;
                showMessage("No tools found.", "error");
            }
        }

        /** Utilities **/
        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'token-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'token-key';
                    else cls = 'token-string';
                } else if (/true|false/.test(match)) cls = 'token-boolean';
                else if (/null/.test(match)) cls = 'token-null';
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function copyValue(val) {
            const textarea = document.createElement('textarea');
            textarea.value = val; document.body.appendChild(textarea);
            textarea.select(); document.execCommand('copy');
            document.body.removeChild(textarea);
            showMessage(`Copied: ${val}`);
        }

        function copyToClipboard() {
            const output = document.getElementById('jsonOutput').innerText;
            if (!output) return;
            const textarea = document.createElement('textarea');
            textarea.value = output; document.body.appendChild(textarea);
            textarea.select(); document.execCommand('copy');
            document.body.removeChild(textarea);
            const btn = document.getElementById('copyBtn');
            const orig = btn.innerHTML; btn.innerHTML = 'Copied!';
            setTimeout(() => { btn.innerHTML = orig; }, 2000);
        }

        function clearAll() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('jsonOutput').innerHTML = '';
            document.getElementById('statusMessage').classList.add('hidden');
        }
    </script>
</body>
</html>
